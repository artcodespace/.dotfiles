  start-at-login = true

  after-startup-command = [
    'exec-and-forget borders active_color="glow(0xffff007b)" inactive_color=0x00000000 width=8.0'
  ]

  on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
  on-focus-changed = ['move-mouse window-lazy-center']

  [gaps]
  inner.horizontal = [{ monitor.built-in = 0 }, 8]
  inner.vertical   = [{ monitor.built-in = 0 }, 8]
  outer.left       = [{ monitor.built-in = 0 }, 8]
  outer.bottom     = [{ monitor.built-in = 0 }, 8]
  outer.top        = [{ monitor.built-in = 0 }, 8]
  outer.right      = [{ monitor.built-in = 0 }, 8]

  # App → workspace assignment
  [[on-window-detected]]
  if.app-id = 'com.apple.iCal'
  run = 'move-node-to-workspace A'

  [[on-window-detected]]
  if.app-id = 'com.tinyspeck.slackmacgap'
  run = 'move-node-to-workspace S'
  
  [[on-window-detected]]
  if.app-id = 'com.figma.Desktop'
  run = 'move-node-to-workspace D'

  [[on-window-detected]]
  if.app-id = 'com.google.Chrome'
  run = 'move-node-to-workspace F'

  [[on-window-detected]]
  if.app-id = 'com.linear'
  run = ['layout tiling', 'move-node-to-workspace G']

  [[on-window-detected]]
  if.app-id = 'com.mitchellh.ghostty'
  run = 'move-node-to-workspace T'

  [mode.main.binding]
  # Layout
  alt-slash = 'layout tiles horizontal vertical'
  alt-comma = 'layout accordion horizontal vertical'

  # Focus
  alt-h = 'focus left'
  alt-j = 'focus down'
  alt-k = 'focus up'
  alt-l = 'focus right'

  # Move window
  alt-shift-h = 'move left'
  alt-shift-j = 'move down'
  alt-shift-k = 'move up'
  alt-shift-l = 'move right'

  # Resize
  alt-minus = 'resize smart -50'
  alt-equal = 'resize smart +50'

  # Workspaces
  alt-a = 'workspace A'
  alt-s = 'workspace S'
  alt-d = 'workspace D'
  alt-f = 'workspace F'
  alt-g = 'workspace G'
  alt-t = 'workspace T'
  alt-space = 'workspace T'
  alt-shift-a = 'move-node-to-workspace A'
  alt-shift-s = 'move-node-to-workspace S'
  alt-shift-d = 'move-node-to-workspace D'
  alt-shift-f = 'move-node-to-workspace F'
  alt-shift-g = 'move-node-to-workspace G'
  alt-shift-t = 'move-node-to-workspace T'
  alt-shift-space = 'move-node-to-workspace T'
  alt-tab = 'workspace-back-and-forth'

  # Custom
  alt-o = "close-all-windows-but-current"
  alt-q = "close"
  alt-z = "fullscreen"

  # Service mode (reload, reset, etc.)
  alt-semicolon = 'mode service'

  [mode.service.binding]
  esc = 'mode main'
  r = ['reload-config', 'mode main']
